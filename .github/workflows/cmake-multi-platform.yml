name: CMake on multiple platforms

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

env:
  CATCH2_VERSION: v3.8.0

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Cache Catch2 (ubuntu)
      if: matrix.os == 'ubuntu-latest'
      id: cache-catch2-ubuntu
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/catch2-install
        key: catch2-${{ env.CATCH2_VERSION }}-ubuntu

    - name: Build and install Catch2 (ubuntu)
      if: matrix.os == 'ubuntu-latest' && steps.cache-catch2-ubuntu.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/catchorg/Catch2.git
        cd Catch2
        git checkout "${{ env.CATCH2_VERSION }}"
        cmake -B build -DBUILD_TESTING=OFF \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/catch2-install
        cmake --build build --target install

    - name: Install Catch2 (macos)
      if: matrix.os == 'macos-latest'
      run: brew install catch2

    - name: Cache Catch2 (windows)
      if: matrix.os == 'windows-latest'
      id: cache-catch2-windows
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/catch2-install
        key: catch2-${{ env.CATCH2_VERSION }}-windows-${{ matrix.build_type }}

    - name: Build and install Catch2 (windows)
      if: matrix.os == 'windows-latest' && steps.cache-catch2-windows.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/catchorg/Catch2.git
        cd Catch2
        git checkout "${{ env.CATCH2_VERSION }}"
        mkdir build && cd build
        cmake .. -DBUILD_TESTING=OFF -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} `
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/catch2-install
        cmake --build . --config ${{ matrix.build_type }} --target install

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_PREFIX_PATH=${{ github.workspace }}/catch2-install
        -S ${{ github.workspace }}
        -DSOCKPP_BUILD_SHARED=OFF
        -DSOCKPP_BUILD_STATIC=ON
        -DSOCKPP_BUILD_EXAMPLES=ON
        -DSOCKPP_BUILD_TESTS=ON

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  shared:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Cache Catch2 (ubuntu)
      if: matrix.os == 'ubuntu-latest'
      id: cache-catch2-ubuntu
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/catch2-install
        key: catch2-${{ env.CATCH2_VERSION }}-ubuntu

    - name: Build and install Catch2 (ubuntu)
      if: matrix.os == 'ubuntu-latest' && steps.cache-catch2-ubuntu.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/catchorg/Catch2.git
        cd Catch2
        git checkout "${{ env.CATCH2_VERSION }}"
        cmake -B build -DBUILD_TESTING=OFF \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/catch2-install
        cmake --build build --target install

    - name: Cache Catch2 (windows)
      if: matrix.os == 'windows-latest'
      id: cache-catch2-windows
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/catch2-install
        key: catch2-${{ env.CATCH2_VERSION }}-windows-${{ matrix.build_type }}

    - name: Build and install Catch2 (windows)
      if: matrix.os == 'windows-latest' && steps.cache-catch2-windows.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/catchorg/Catch2.git
        cd Catch2
        git checkout "${{ env.CATCH2_VERSION }}"
        mkdir build && cd build
        cmake .. -DBUILD_TESTING=OFF -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} `
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/catch2-install
        cmake --build . --config ${{ matrix.build_type }} --target install

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_PREFIX_PATH=${{ github.workspace }}/catch2-install
        -S ${{ github.workspace }}
        -DSOCKPP_BUILD_SHARED=ON
        -DSOCKPP_BUILD_STATIC=OFF
        -DSOCKPP_BUILD_TESTS=ON

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  sanitize:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Cache Catch2
      id: cache-catch2
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/catch2-install
        key: catch2-${{ env.CATCH2_VERSION }}-ubuntu

    - name: Build and install Catch2
      if: steps.cache-catch2.outputs.cache-hit != 'true'
      run: |
        git clone https://github.com/catchorg/Catch2.git
        cd Catch2
        git checkout "${{ env.CATCH2_VERSION }}"
        cmake -B build -DBUILD_TESTING=OFF \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/catch2-install
        cmake --build build --target install

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake with ASan/UBSan
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
        -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
        -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
        -DCMAKE_PREFIX_PATH=${{ github.workspace }}/catch2-install
        -S ${{ github.workspace }}
        -DSOCKPP_BUILD_SHARED=OFF
        -DSOCKPP_BUILD_STATIC=ON
        -DSOCKPP_BUILD_TESTS=ON

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      env:
        ASAN_OPTIONS: strict_string_checks=1:detect_stack_use_after_return=1:check_initialization_order=1:strict_init_order=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: ctest --output-on-failure
