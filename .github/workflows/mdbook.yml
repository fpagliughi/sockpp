# Validates the mdBook builds cleanly on every push or PR to the gh-pages
# branch. Deployment is handled by docs.yml on the master branch, which
# builds both the mdBook and the Doxygen API reference together.

name: Validate mdBook

on:
  push:
    branches: ["gh-pages"]
  pull_request:
    branches: ["gh-pages"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install latest mdBook
        run: |
          tag=$(curl -s 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' \
            | jq -r '.tag_name')
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir mdbook
          curl -sSL "$url" | tar -xz --directory=./mdbook
          echo "$PWD/mdbook" >> "$GITHUB_PATH"

      - name: Build Book
        run: mdbook build
